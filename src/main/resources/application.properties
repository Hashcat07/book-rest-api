# =========================
# Application
# =========================
spring.application.name=book-rest-api
server.port=8080

# =========================
# MySQL Database
# Credentials are read from environment variables, with local dev defaults.
# Set DB_USERNAME / DB_PASSWORD in your environment for anything real.
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/bookdb
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / Hibernate
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================
# Logging
# =========================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# =========================
# Actuator & Content Negotiation
# =========================
management.endpoints.web.exposure.include=health,info,metrics
spring.mvc.contentnegotiation.favor-parameter=true
spring.mvc.contentnegotiation.media-types.json=application/json
spring.mvc.contentnegotiation.media-types.xml=application/xml

# =========================
# JWT
# secret must be at least 32 characters (256-bit key for HS256)
# =========================
jwt.secret=${JWT_SECRET:dev-secret-change-me-please-min-32-bytes-1234567890}
jwt.expiration=900000

# =========================
# CORS
# comma-separated origins allowed to call this API (the React dev server)
# =========================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}
